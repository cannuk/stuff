<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Chicago · June 4–8</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Archivo:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #0e1620;
        --ink2: #16212e;
        --ink3: #1d2c3c;
        --raise: #1b2a3a;
        --sky: #5fb4e6;
        --sky-bright: #86cdf2;
        --sky-dim: #3a6f93;
        --red: #e0434f;
        --red-deep: #b8313c;
        --cream: #ece6d8;
        --dim: #8fa1b2;
        --line: rgba(95, 180, 230, 0.18);
        --line-soft: rgba(95, 180, 230, 0.09);
        --disp: "Cinzel", Georgia, serif;
        --body: "Archivo", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: var(--body);
        color: var(--cream);
        background: var(--ink);
        background-image: radial-gradient(
          125% 55% at 50% -8%,
          rgba(95, 180, 230, 0.12),
          transparent 60%
        );
        line-height: 1.55;
        min-height: 100vh;
        padding-bottom: 48px;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 580px;
        margin: 0 auto;
        padding: 0 18px;
      }
      .star {
        display: inline-block;
        vertical-align: middle;
        fill: currentColor;
      }
      .s-xs {
        width: 11px;
        height: 11px;
      }
      .s-sm {
        width: 14px;
        height: 14px;
      }
      .s-md {
        width: 20px;
        height: 20px;
      }
      .spark {
        display: inline-block;
        vertical-align: middle;
        fill: currentColor;
        width: 12px;
        height: 12px;
      }

      header {
        text-align: center;
        padding: 34px 0 16px;
        position: relative;
        overflow: hidden;
      }
      .ghost {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: 230px;
        height: 230px;
        color: var(--sky);
        opacity: 0.06;
        z-index: 0;
        pointer-events: none;
      }
      header > * {
        position: relative;
        z-index: 1;
      }
      .kicker {
        font-size: 11px;
        letter-spacing: 0.42em;
        margin-right: -0.42em;
        display: inline-block;
        text-transform: uppercase;
        color: var(--sky);
        font-weight: 600;
      }
      h1 {
        font-family: var(--disp);
        font-weight: 700;
        font-size: clamp(48px, 17vw, 82px);
        line-height: 0.94;
        letter-spacing: 0.04em;
        margin: 6px 0 4px;
      }
      .dates {
        font-size: 13px;
        letter-spacing: 0.3em;
        margin-right: -0.3em;
        display: inline-block;
        text-transform: uppercase;
        color: var(--dim);
      }
      .flagrule {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin: 18px auto 2px;
        max-width: 340px;
      }
      .flagrule .bar {
        height: 5px;
        flex: 1;
        background: var(--sky);
        border-radius: 2px;
        opacity: 0.85;
      }
      .flagrule .stars {
        display: flex;
        gap: 7px;
        color: var(--red);
      }
      .status {
        font-size: 14px;
        color: var(--sky-bright);
        letter-spacing: 0.06em;
        margin-top: 12px;
        min-height: 20px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 10;
        background: linear-gradient(var(--ink) 76%, transparent);
        padding: 14px 0 12px;
        margin-top: 6px;
      }
      .pills {
        overflow-x: auto;
        scrollbar-width: none;
        padding: 2px 18px;
        max-width: 580px;
        margin: 0 auto;
      }
      .pills::-webkit-scrollbar {
        display: none;
      }
      .pills-row {
        display: flex;
        gap: 8px;
        width: max-content;
        margin: 0 auto;
      }
      .pill {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: var(--ink2);
        color: var(--dim);
        border-radius: 11px;
        padding: 9px 13px 8px;
        text-align: center;
        min-width: 60px;
        cursor: pointer;
        transition: 0.18s ease;
        position: relative;
      }
      .pill .dow {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        display: block;
      }
      .pill .dnum {
        font-family: var(--disp);
        font-size: 21px;
        font-weight: 600;
        line-height: 1;
        margin-top: 3px;
        display: block;
      }
      .pill.active {
        background: var(--sky);
        border-color: var(--sky);
        color: #08131d;
      }
      .pill .pin {
        position: absolute;
        top: 5px;
        right: 6px;
        color: var(--red);
      }
      .pill.active .pin {
        color: #08131d;
      }

      .daysub {
        text-align: center;
        font-family: var(--disp);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: var(--sky);
        text-transform: uppercase;
        margin: 8px 0 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .wx {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        margin: -10px 0 16px;
        font-size: 12.5px;
        color: var(--sky-bright);
        letter-spacing: 0.03em;
      }
      .wx .wxi {
        width: 17px;
        height: 17px;
        color: var(--sky);
      }
      .wx .sep,
      .wx .wxp {
        color: var(--dim);
      }
      .tabs {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin: 4px 0 2px;
      }
      .tab {
        font-family: var(--disp);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--dim);
        background: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 8px 16px;
        cursor: pointer;
        transition: 0.15s;
      }
      .tab.active {
        background: var(--sky);
        border-color: var(--sky);
        color: #08131d;
      }
      .fc-note {
        text-align: center;
        font-size: 12.5px;
        color: var(--dim);
        font-style: italic;
        margin: 6px 0 14px;
      }
      .fc-card {
        background: var(--ink2);
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        padding: 15px 16px;
        margin-bottom: 12px;
      }
      .fc-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
      }
      .fc-day {
        font-family: var(--disp);
        font-size: 17px;
        font-weight: 600;
        color: var(--cream);
        letter-spacing: 0.04em;
      }
      .fc-date {
        font-size: 10px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--sky);
        margin-top: 3px;
      }
      .fc-ic {
        color: var(--sky);
      }
      .fc-ic .wxi {
        width: 34px;
        height: 34px;
      }
      .fc-main {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-top: 6px;
      }
      .fc-temp {
        font-family: var(--disp);
        font-size: 30px;
        font-weight: 700;
        color: var(--cream);
        line-height: 1;
      }
      .fc-temp .lo {
        font-size: 18px;
        color: var(--dim);
        font-weight: 600;
      }
      .fc-cond {
        font-size: 13px;
        color: var(--sky-bright);
      }
      .fc-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 9px 14px;
        margin-top: 14px;
        padding-top: 13px;
        border-top: 1px solid var(--line-soft);
      }
      .fc-grid .cell {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .fc-grid .lbl {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dim);
      }
      .fc-grid .val {
        font-size: 14px;
        color: var(--cream);
      }
      .fc-na {
        font-size: 13px;
        color: var(--dim);
        margin-top: 8px;
      }
      .daysub .star {
        color: var(--red);
      }

      .card {
        background: var(--ink2);
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 12px;
        opacity: 0;
        transform: translateY(8px);
        animation: rise 0.42s ease forwards;
      }
      @keyframes rise {
        to {
          opacity: 1;
          transform: none;
        }
      }
      .card.next {
        border-color: var(--red);
        background: var(--raise);
        box-shadow: 0 0 0 1px rgba(224, 67, 79, 0.3);
      }
      .time {
        font-family: var(--disp);
        font-size: 13px;
        font-weight: 600;
        color: var(--sky-bright);
        letter-spacing: 0.06em;
        margin-bottom: 7px;
        display: flex;
        align-items: baseline;
        gap: 8px;
      }
      .time small {
        font-family: var(--body);
        font-size: 11px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--dim);
      }
      .title {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .place {
        font-size: 13.5px;
        color: var(--sky);
        margin-top: 1px;
      }
      .who {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--dim);
        margin-top: 5px;
      }
      .note {
        font-size: 13.5px;
        color: var(--dim);
        margin-top: 8px;
        line-height: 1.5;
      }
      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 11px;
      }
      .btn {
        font-size: 12px;
        color: var(--cream);
        text-decoration: none;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 5px 10px;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: 0.15s;
        cursor: pointer;
        background: none;
        font-family: var(--body);
      }
      .btn:hover {
        border-color: var(--sky);
        color: var(--sky-bright);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 3px 8px;
        border-radius: 6px;
        font-weight: 600;
        vertical-align: middle;
        margin-left: 8px;
      }
      .b-booked {
        background: rgba(95, 180, 230, 0.14);
        color: var(--sky-bright);
        border: 1px solid rgba(95, 180, 230, 0.32);
      }
      .b-todo {
        color: var(--red);
        border: 1px solid rgba(224, 67, 79, 0.5);
      }
      .b-pick {
        color: var(--sky-bright);
        border: 1px solid rgba(95, 180, 230, 0.4);
      }
      .b-prop {
        color: var(--dim);
        border: 1px solid var(--line-soft);
      }
      .b-next {
        background: var(--red);
        color: #fff;
      }

      .hint {
        font-size: 12px;
        color: var(--dim);
        margin-top: 9px;
        font-style: italic;
      }
      .opts {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 9px;
      }
      .opt {
        font-family: var(--body);
        font-size: 13px;
        color: var(--cream);
        background: var(--ink3);
        border: 1px solid var(--line);
        border-radius: 9px;
        padding: 7px 11px;
        cursor: pointer;
        transition: 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .opt:hover {
        border-color: var(--sky);
      }
      .opt .star {
        color: var(--red);
      }
      .opt.on {
        background: var(--sky);
        border-color: var(--sky);
        color: #08131d;
      }
      .opt.on .star {
        color: #08131d;
      }
      .det {
        max-height: 0;
        overflow: hidden;
        transition:
          max-height 0.3s ease,
          margin 0.3s ease;
        margin-top: 0;
      }
      .det.show {
        max-height: 340px;
        margin-top: 11px;
      }
      .det-top {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sky);
        font-weight: 600;
      }
      .det-vibe {
        font-size: 13.5px;
        color: var(--cream);
        margin-top: 6px;
        line-height: 1.55;
      }

      .flag {
        background: var(--ink2);
        border: 1px solid var(--line);
        border-left: 3px solid var(--red);
        border-radius: 0 12px 12px 0;
        padding: 14px 16px;
        margin: 24px 0 8px;
      }
      .flag h3 {
        font-family: var(--disp);
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--sky);
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .flag h3 .star {
        color: var(--red);
      }
      .flag p {
        font-size: 13.5px;
        color: var(--dim);
      }
      footer {
        text-align: center;
        margin-top: 30px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--dim);
      }
      footer .star {
        color: var(--red);
        margin: 0 6px;
      }
    </style>
  </head>

      </footer>

            .map(
              (s) =>
                '<div class="cell"><span class="lbl">' +
                s[0] +
                '</span><span class="val">' +
                s[1] +
                "</span></div>",
            )
            .join("")
          return (
            '<div class="fc-card">' +
            head +
            '<div class="fc-ic">' +
            ic[0] +
            "</div></div>" +
            '<div class="fc-main"><div class="fc-temp">' +
            w.hi +
            '°<span class="lo"> / ' +
            w.lo +
            '°</span></div><div class="fc-cond">' +
            ic[1] +
            "</div></div>" +
            '<div class="fc-grid">' +
            grid +
            "</div></div>"
          )
        }).join("")
        el.innerHTML = note + cards
      }
      function showTab(name) {
        const itin = name !== "forecast"
        document.getElementById("nav").style.display = itin ? "" : "none"
        document.getElementById("daysub").style.display = itin ? "" : "none"
        document.getElementById("panel").style.display = itin ? "" : "none"
        document.getElementById("forecast").style.display = itin
          ? "none"
          : "block"
        document.getElementById("tab-itin").classList.toggle("active", itin)
        document.getElementById("tab-fc").classList.toggle("active", !itin)
        if (itin) {
          setWx(TRIP[curIdx].iso)
        } else {
          document.getElementById("wx").style.display = "none"
          renderForecast()
        }
      }
      function render(idx) {
        const day = TRIP[idx]
        curIdx = idx
        document
          .querySelectorAll(".pill")
          .forEach((p, i) => p.classList.toggle("active", i === idx))
        document.getElementById("daysub").innerHTML =
          '<svg class="star s-sm"><use href="#cs"/></svg> ' +
          day.dow +
          " &middot; June " +
          day.dnum +
          ' <svg class="star s-sm"><use href="#cs"/></svg>'
        const nx = nextIdxFor(day)
        const toOpen = []
        document.getElementById("panel").innerHTML = day.items
          .map((it, i) => {
            const isNext = i === nx
            const s = STAT[it.status]
            const badge = isNext
              ? '<span class="badge b-next">' + STAR + "Up next</span>"
              : '<span class="badge ' +
                s[1] +
                '">' +
                (it.status === "pick" ? STAR : "") +
                s[0] +
                "</span>"
            let body
            if (it.options) {
              const id = "d" + idx + "i" + i
              OPTS[id] = it.options
              let pi = it.options.findIndex((o) => o.pick)
              if (pi < 0) pi = 0
              toOpen.push([id, pi])
              const chips = it.options
                .map(
                  (o, oi) =>
                    '<button class="opt" id="' +
                    id +
                    "-opt" +
                    oi +
                    '" onclick="pick(\'' +
                    id +
                    "'," +
                    oi +
                    ')">' +
                    (o.pick ? STAR : "") +
                    o.name +
                    "</button>",
                )
                .join("")
              body =
                '<div class="title">' +
                it.title +
                badge +
                '</div><div class="who">' +
                it.who +
                "</div>" +
                '<div class="hint">Tap an option for the vibe, cuisine &amp; price</div>' +
                '<div class="opts">' +
                chips +
                '</div><div class="det" id="det-' +
                id +
                '"></div>'
            } else {
              let meta = ""
              if (it.addr)
                meta +=
                  '<a class="btn" target="_blank" rel="noopener" href="' +
                  mapsURL(it.addr) +
                  '">&#9906; Map</a>'
              if (it.phone)
                meta +=
                  '<a class="btn" href="tel:' + it.phone + '">&#9742; Call</a>'
              body =
                '<div class="title">' +
                it.title +
                badge +
                "</div>" +
                (it.place ? '<div class="place">' + it.place + "</div>" : "") +
                '<div class="who">' +
                it.who +
                "</div>" +
                (it.note ? '<div class="note">' + it.note + "</div>" : "") +
                (meta ? '<div class="meta">' + meta + "</div>" : "")
            }
            return (
              '<div class="card' +
              (isNext ? " next" : "") +
              '" style="animation-delay:' +
              i * 55 +
              'ms"><div class="time">' +
              it.t +
              (it.ap ? "<small>" + it.ap + "</small>" : "") +
              "</div>" +
              body +
              "</div>"
            )
          })
          .join("")
        toOpen.forEach((p) => pick(p[0], p[1]))
        setWx(day.iso)
      }

      const pills = document.getElementById("pills")
      TRIP.forEach((d, i) => {
        const b = document.createElement("button")
        b.className = "pill" + (d.iso === todayISO ? " today" : "")
        b.innerHTML =
          '<span class="dow">' +
          d.short +
          '</span><span class="dnum">' +
          d.dnum +
          "</span>" +
          (d.iso === todayISO
            ? '<svg class="star s-xs pin"><use href="#cs"/></svg>'
            : "")
        b.onclick = () => render(i)
        pills.appendChild(b)
      })
      setStatus()
      const startIdx =
        todayIdx > -1
          ? todayIdx
          : now > new Date(2026, 5, 8, 23, 59)
            ? TRIP.length - 1
            : 0
      render(startIdx)
      const ap = pills.children[startIdx]
      if (ap) ap.scrollIntoView({ inline: "center", block: "nearest" })
      document.getElementById("tab-itin").onclick = () => showTab("itinerary")
      document.getElementById("tab-fc").onclick = () => showTab("forecast")
      loadWx()
      if (todayIdx > -1) {
        setTimeout(() => {
          const n = document.querySelector(".card.next")
          if (n) n.scrollIntoView({ behavior: "smooth", block: "center" })
        }, 400)
      }
    </script>
  </body>
</html>
