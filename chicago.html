        --ink3: #1d2c3c;
        --raise: #1b2a3a;
        --sky: #5fb4e6;
        --sky-bright: #86cdf2;
        --sky-dim: #3a6f93;
        --red: #e0434f;
        --red-deep: #b8313c;
        --cream: #ece6d8;
        --dim: #8fa1b2;
        --line: rgba(95, 180, 230, 0.18);
        --line-soft: rgba(95, 180, 230, 0.09);
        --disp: "Cinzel", Georgia, serif;
        --body: "Archivo", system-ui, sans-serif;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        -webkit-text-size-adjust: 100%;
      }
      body {
        font-family: var(--body);
        color: var(--cream);
        background: var(--ink);
        background-image: radial-gradient(
          125% 55% at 50% -8%,
          rgba(95, 180, 230, 0.12),
          transparent 60%
        );
        line-height: 1.55;
        min-height: 100vh;
        padding-bottom: 48px;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        max-width: 580px;
        margin: 0 auto;
        padding: 0 18px;
      }
      .star {
        display: inline-block;
        vertical-align: middle;
        fill: currentColor;
      }
      .s-xs {
        width: 11px;
        height: 11px;
      }
      .s-sm {
        width: 14px;
        height: 14px;
      }
      .s-md {
        width: 20px;
        height: 20px;
      }
      .spark {
        display: inline-block;
        vertical-align: middle;
        fill: currentColor;
        width: 12px;
        height: 12px;
      }

      header {
        text-align: center;
        padding: 34px 0 16px;
        position: relative;
        overflow: hidden;
      }
      .ghost {
        position: absolute;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: 230px;
        height: 230px;
        color: var(--sky);
        opacity: 0.06;
        z-index: 0;
        pointer-events: none;
      }
      header > * {
        position: relative;
        z-index: 1;
      }
      .kicker {
        font-size: 11px;
        letter-spacing: 0.42em;
        margin-right: -0.42em;
        display: inline-block;
        text-transform: uppercase;
        color: var(--sky);
        font-weight: 600;
      }
      h1 {
        font-family: var(--disp);
        font-weight: 700;
        font-size: clamp(48px, 17vw, 82px);
        line-height: 0.94;
        letter-spacing: 0.04em;
        margin: 6px 0 4px;
      }
      .dates {
        font-size: 13px;
        letter-spacing: 0.3em;
        margin-right: -0.3em;
        display: inline-block;
        text-transform: uppercase;
        color: var(--dim);
      }
      .flagrule {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        margin: 18px auto 2px;
        max-width: 340px;
      }
      .flagrule .bar {
        height: 5px;
        flex: 1;
        background: var(--sky);
        border-radius: 2px;
        opacity: 0.85;
      }
      .flagrule .stars {
        display: flex;
        gap: 7px;
        color: var(--red);
      }
      .status {
        font-size: 14px;
        color: var(--sky-bright);
        letter-spacing: 0.06em;
        margin-top: 12px;
        min-height: 20px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      nav {
        position: sticky;
        top: 0;
        z-index: 10;
        background: linear-gradient(var(--ink) 76%, transparent);
        padding: 14px 0 12px;
        margin-top: 6px;
      }
      .pills {
        overflow-x: auto;
        scrollbar-width: none;
        padding: 2px 18px;
        max-width: 580px;
        margin: 0 auto;
      }
      .pills::-webkit-scrollbar {
        display: none;
      }
      .pills-row {
        display: flex;
        gap: 8px;
        width: max-content;
        margin: 0 auto;
      }
      .pill {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        background: var(--ink2);
        color: var(--dim);
        border-radius: 11px;
        padding: 9px 13px 8px;
        text-align: center;
        min-width: 60px;
        cursor: pointer;
        transition: 0.18s ease;
        position: relative;
      }
      .pill .dow {
        font-size: 10px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        display: block;
      }
      .pill .dnum {
        font-family: var(--disp);
        font-size: 21px;
        font-weight: 600;
        line-height: 1;
        margin-top: 3px;
        display: block;
      }
      .pill.active {
        background: var(--sky);
        border-color: var(--sky);
        color: #08131d;
      }
      .pill .pin {
        position: absolute;
        top: 5px;
        right: 6px;
        color: var(--red);
      }
      .pill.active .pin {
        color: #08131d;
      }

      .daysub {
        text-align: center;
        font-family: var(--disp);
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0.14em;
        color: var(--sky);
        text-transform: uppercase;
        margin: 8px 0 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .daysub .star {
        color: var(--red);
      }

      .card {
        background: var(--ink2);
        border: 1px solid var(--line-soft);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 12px;
        opacity: 0;
        transform: translateY(8px);
        animation: rise 0.42s ease forwards;
      }
      @keyframes rise {
        to {
          opacity: 1;
          transform: none;
        }
      }
      .card.next {
        border-color: var(--red);
        background: var(--raise);
        box-shadow: 0 0 0 1px rgba(224, 67, 79, 0.3);
      }
      .time {
        font-family: var(--disp);
        font-size: 13px;
        font-weight: 600;
        color: var(--sky-bright);

        margin-bottom: 7px;

        align-items: baseline;
        gap: 8px;

        text-transform: uppercase;

        font-weight: 600;

      .who {

        color: var(--dim);

        align-items: center;
        gap: 5px;

        background: none;
        font-family: var(--body);

      .btn:hover {
        border-color: var(--sky);
        color: var(--sky-bright);
      }

        align-items: center;

        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--sky);
        font-weight: 600;

        margin-top: 30px;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;

        color: var(--red);
        margin: 0 6px;

                  vibe: "Step onto the glass Ledge boxes 1,353 ft up — the big Chicago thrill. Open late.",
                  addr: "233 S Wacker Dr, Chicago, IL",
                  phone: "+13128759447",
                  pick: true,
                },
                {
                  name: "Millennium Park & The Bean",
                  cuisine: "Iconic park · free",
                  price: "Free",
                  vibe: "Cloud Gate\u2019s mirror, the fountains and gardens — right across from the hotel.",
                  addr: "201 E Randolph St, Chicago, IL",
                },
                {
                  name: "Field Museum",
                  cuisine: "Natural history · Museum Campus",
                  price: "$$$",
                  vibe: "Meet Sue the T. rex plus mummies and gems on the lakefront. Closes 5 PM.",
                  addr: "1400 S Lake Shore Dr, Chicago, IL",
                  phone: "+13129229410",
                },
                {
                  name: "Navy Pier",
                  cuisine: "Lakefront fun · Ferris wheel",
                  price: "Free entry",
                  vibe: "The Centennial Wheel, boat rides and lake views — lively and easy to wander.",
                  addr: "600 E Grand Ave, Chicago, IL",
                  phone: "+13125957437",
                },
              ],
            },
            {
              t: "Evening",
              m: 1140,
              title: "Classic Chicago dinner",
              who: "All three",
              status: "pick",
              options: [
                {
                  name: "Twin Anchors",
                  cuisine: "Ribs · Prohibition tavern",
                  price: "$$",
                  vibe: "Fall-off-the-bone baby backs in a 1930s tavern, Sinatra\u2019s old haunt. No reservations — grab the bar.",
                  addr: "1655 N Sedgwick St, Chicago, IL",
                  phone: "+13122661616",
                  pick: true,
                },
                {
                  name: "Tufano's Vernon Park Tap",
                  cuisine: "Neighborhood Italian",
                  price: "$$",
                  vibe: "Cash-only Little Italy gem since 1930. Generous red-sauce plates, beloved meatballs, zero tourist sheen.",
                  addr: "1073 W Vernon Park Pl, Chicago, IL",
                  phone: "+13127333393",
                },
                {
                  name: "The Berghoff",
                  cuisine: "German-American landmark",
                  price: "$$",
                  vibe: "Chicago\u2019s oldest restaurant (1898), house beer, closest to the hotel. Closes 8 PM — an earlier dinner.",
                  addr: "17 W Adams St, Chicago, IL",
                  phone: "+13124273170",
                },
              ],
            },
          ],
        },
        {
          dow: "Monday",
          short: "Mon",
          dnum: "8",
          iso: "2026-06-08",
          sub: "Departure",
          items: [
            {
              t: "Morning",
              m: 540,
              title: "Pack + last stroll",
              place: "Near the hotel",
              who: "All three",
              note: "Grab any last Michigan Ave / lakefront moments before checkout.",
              status: "prop",
            },
            {
              t: "12:00",
              ap: "PM",
              m: 720,
              title: "Check out",
              place: "Congress Plaza Hotel",
              addr: "520 S Michigan Ave, Chicago, IL",
              who: "All three",
              note: "By noon. Stash bags at the front desk to keep the afternoon free.",
              status: "booked",
              phone: "+13124273800",
            },
            {
              t: "~3:00",
              ap: "PM",
              m: 900,
              title: "Head to O\u2019Hare",
              place: "Gene & Jude\u2019s on the way",
              who: "All three",
              note: "Leave downtown ~3 PM for the 5:22 flight (~40-min ride). Gene & Jude\u2019s in River Grove sits right by ORD — the perfect farewell Chicago dog.",
              status: "prop",
              phone: "+17084527634",
            },
            {
              t: "5:22",
              ap: "PM",
              m: 1042,
              title: "Fly ORD → SFO",
              who: "All three",
              note: "Depart O\u2019Hare 5:22 PM CT, land SFO 8:13 PM PT.",
              status: "booked",
            },
          ],
        },
      ]
      const STAT = {
        booked: ["Booked", "b-booked"],
        todo: ["To book", "b-todo"],
        pick: ["Pick one", "b-pick"],
        prop: ["Optional", "b-prop"],
      }
      const OPTS = {}
      const now = new Date()
      const todayISO =
        now.getFullYear() +
        "-" +
        String(now.getMonth() + 1).padStart(2, "0") +
        "-" +
        String(now.getDate()).padStart(2, "0")
      const nowMin = now.getHours() * 60 + now.getMinutes()
      const todayIdx = TRIP.findIndex((d) => d.iso === todayISO)
      function mapsURL(a) {
        return "https://maps.google.com/?q=" + encodeURIComponent(a)
      }

      function setStatus() {
        const el = document.getElementById("status")
        if (todayIdx > -1) {
          el.innerHTML =
            STAR + "Today · Day " + (todayIdx + 1) + " · " + TRIP[todayIdx].dow
          return
        }
        const start = new Date(2026, 5, 4),
          t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate())
        const diff = Math.round((start - t0) / 86400000)
        if (diff > 0)
          el.innerHTML =
            STAR + diff + (diff === 1 ? " day to go" : " days to go")
        else el.innerHTML = STAR + "That’s a wrap — hope it was a blast."
      }
      function nextIdxFor(day) {
        if (day.iso !== todayISO) return -1
        for (let i = 0; i < day.items.length; i++) {
          if (typeof day.items[i].m === "number" && day.items[i].m >= nowMin)
            return i
        }
        return -1
      }
      function pick(id, oi) {
        const o = OPTS[id][oi]
        document
          .querySelectorAll('[id^="' + id + '-opt"]')
          .forEach((b) => b.classList.remove("on"))
        const chip = document.getElementById(id + "-opt" + oi)
        if (chip) chip.classList.add("on")
        let meta = ""
        if (o.addr)
          meta +=
            '<a class="btn" target="_blank" rel="noopener" href="' +
            mapsURL(o.addr) +
            '">&#9906; Map</a>'
        if (o.phone)
          meta += '<a class="btn" href="tel:' + o.phone + '">&#9742; Call</a>'
        const d = document.getElementById("det-" + id)
        d.innerHTML =
          '<div class="det-top">' +
          o.cuisine +
          " &middot; " +
          o.price +
          '</div><div class="det-vibe">' +
          o.vibe +
          "</div>" +
          (meta ? '<div class="meta">' + meta + "</div>" : "")
        d.classList.add("show")
      }

      function render(idx) {
        const day = TRIP[idx]
        document
          .querySelectorAll(".pill")
          .forEach((p, i) => p.classList.toggle("active", i === idx))
        document.getElementById("daysub").innerHTML =
          '<svg class="star s-sm"><use href="#cs"/></svg> ' +
          day.dow +
          " &middot; June " +
          day.dnum +
          ' <svg class="star s-sm"><use href="#cs"/></svg>'
        const nx = nextIdxFor(day)
        const toOpen = []
        document.getElementById("panel").innerHTML = day.items
          .map((it, i) => {
            const isNext = i === nx
            const s = STAT[it.status]
            const badge = isNext
              ? '<span class="badge b-next">' + STAR + "Up next</span>"
              : '<span class="badge ' +
                s[1] +
                '">' +
                (it.status === "pick" ? STAR : "") +
                s[0] +
                "</span>"
            let body
            if (it.options) {
              const id = "d" + idx + "i" + i
              OPTS[id] = it.options
              let pi = it.options.findIndex((o) => o.pick)
              if (pi < 0) pi = 0
              toOpen.push([id, pi])
              const chips = it.options
                .map(
                  (o, oi) =>
                    '<button class="opt" id="' +
                    id +
                    "-opt" +
                    oi +
                    '" onclick="pick(\'' +
                    id +
                    "'," +
                    oi +
                    ')">' +
                    (o.pick ? STAR : "") +
                    o.name +
                    "</button>",
                )
                .join("")
              body =
                '<div class="title">' +
                it.title +
                badge +
                '</div><div class="who">' +
                it.who +
                "</div>" +
                '<div class="hint">Tap an option for the vibe, cuisine &amp; price</div>' +
                '<div class="opts">' +
                chips +
                '</div><div class="det" id="det-' +
                id +
                '"></div>'
            } else {
              let meta = ""
              if (it.addr)
                meta +=
                  '<a class="btn" target="_blank" rel="noopener" href="' +
                  mapsURL(it.addr) +
                  '">&#9906; Map</a>'
              if (it.phone)
                meta +=
                  '<a class="btn" href="tel:' + it.phone + '">&#9742; Call</a>'
              body =
                '<div class="title">' +
                it.title +
                badge +
                "</div>" +
                (it.place ? '<div class="place">' + it.place + "</div>" : "") +
                '<div class="who">' +
                it.who +
                "</div>" +
                (it.note ? '<div class="note">' + it.note + "</div>" : "") +
                (meta ? '<div class="meta">' + meta + "</div>" : "")
            }
            return (
              '<div class="card' +
              (isNext ? " next" : "") +
              '" style="animation-delay:' +
              i * 55 +
              'ms"><div class="time">' +
              it.t +
              (it.ap ? "<small>" + it.ap + "</small>" : "") +
              "</div>" +
              body +
              "</div>"
            )
          })
          .join("")
        toOpen.forEach((p) => pick(p[0], p[1]))
      }

      const pills = document.getElementById("pills")
      TRIP.forEach((d, i) => {
        const b = document.createElement("button")
        b.className = "pill" + (d.iso === todayISO ? " today" : "")
        b.innerHTML =
          '<span class="dow">' +
          d.short +
          '</span><span class="dnum">' +
          d.dnum +
          "</span>" +
          (d.iso === todayISO
            ? '<svg class="star s-xs pin"><use href="#cs"/></svg>'
            : "")
        b.onclick = () => render(i)
        pills.appendChild(b)
      })
      setStatus()
      const startIdx =
        todayIdx > -1
          ? todayIdx
          : now > new Date(2026, 5, 8, 23, 59)
            ? TRIP.length - 1
            : 0
      render(startIdx)
      const ap = pills.children[startIdx]
      if (ap) ap.scrollIntoView({ inline: "center", block: "nearest" })
      if (todayIdx > -1) {
        setTimeout(() => {
          const n = document.querySelector(".card.next")
          if (n) n.scrollIntoView({ behavior: "smooth", block: "center" })
        }, 400)
      }
    </script>
  </body>
</html>
